baseURL: 'https://datadripco.com/'
languageCode: 'en-us'
title: 'Datadripco'
theme: 'PaperMod'
paginate: 6
enableRobotsTXT: true
enableGitInfo: true   # accurate lastmod dates for sitemap SEO

sitemap:
  changefreq: daily   # ideal for daily bot posts
  priority: 0.8
  filename: sitemap.xml

outputs:
  home:
    - HTML
    - RSS
    - JSON

copyright: "© 2026 Datadripco. All rights reserved."

params:
  description: "Datadripco — Daily original insights on AI, Crypto & Tech. Smart analysis, zero fluff."
  author: "Datadripco Team"
  keywords: ["AI news", "crypto news", "tech news", "artificial intelligence", "machine learning", "bitcoin", "ethereum", "grok", "blockchain", "tech trends", "ai trends", "crypto trends"]
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowSearch: true
  ShowToc: true          # table of contents on every post — better on-page SEO & readability
  ShowCanonicalLink: true  # prevents duplicate-content penalties

  homeInfoParams:
    Title: "Datadripco"
    Content: "Your daily source for original, high-value insights on Artificial Intelligence, Cryptocurrency, and Emerging Technology. Fresh news. Real analysis. Built for forward-thinkers who want to stay ahead."

  social:
    twitter: "datadripco"

  images:
    - /images/og-default.jpg

  socialIcons:
    - name: github
      url: "https://github.com/boonziman/datadrip"
    - name: x
      url: "https://x.com/datadripco"
    - name: rss
      url: "https://datadripco.com/index.xml"

menu:
  main:
    - name: Home
      url: /
      weight: 1
    - name: AI News
      url: /categories/ai/
      weight: 2
    - name: Crypto Trends
      url: /categories/crypto/
      weight: 3
    - name: Tech Innovations
      url: /categories/tech/
      weight: 4
    - name: About
      url: /about/
      weight: 5
    - name: Contact
      url: /contact/
      weight: 6
    - name: Search
      url: /search/
      weight: 7

  footer:
    - name: About
      url: /about/
      weight: 1
    - name: Contact
      url: /contact/
      weight: 2
    - name: Privacy Policy
      url: /privacy/
      weight: 3
    - name: Terms of Service
      url: /terms/
      weight: 4
    - name: Editorial Standards
      url: /editorial-standards/
      weight: 5
