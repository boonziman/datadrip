name: Daily Datadrip Smart Tweets

on:
  schedule:
    - cron: '0 16 * * *'  # 08:00 AM PST / 16:00 UTC
    - cron: '0 19 * * *'  # 11:00 AM PST / 19:00 UTC
    - cron: '0 22 * * *'  # 02:00 PM PST / 22:00 UTC
    - cron: '0 1 * * *'   # 05:00 PM PST / 01:00 UTC (next day)
    - cron: '0 4 * * *'   # 08:00 PM PST / 04:00 UTC (next day)
    - cron: '0 6 * * *'   # 10:00 PM PST / 06:00 UTC (next day)
  workflow_dispatch:      # Allows manual test anytime

permissions:
  contents: write          # Needed to commit tweet memory log

concurrency:
  group: "tweets"
  cancel-in-progress: false  # Don't cancel — each tweet is unique

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smart tweet generator (Grok-powered + trend-aware)
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/generate_and_post_tweet.py

      - name: Commit tweet memory log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tweet_log.json data/cost_log.json data/report.md
          if git diff --staged --quiet; then
            echo "No tweet log changes to commit"
          else
            git pull --rebase origin main || true
            git commit -m "chore(tweets): update tweet memory $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
