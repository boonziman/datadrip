name: Daily Datadrip Smart Tweets

on:
  schedule:
    - cron: '37 16 * * *'  # 8:37 AM PST  (off-minute avoids GitHub thundering herd)
    - cron: '23 19 * * *'  # 11:23 AM PST
    - cron: '51 21 * * *'  # 1:51 PM PST
    - cron: '17 1 * * *'   # 5:17 PM PST
    - cron: '43 3 * * *'   # 7:43 PM PST
    - cron: '29 6 * * *'   # 10:29 PM PST
  workflow_dispatch:      # Allows manual test anytime

permissions:
  contents: write          # Needed to commit tweet memory log

concurrency:
  group: "tweets"
  cancel-in-progress: false  # Don't cancel — each tweet is unique

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smart tweet generator (Grok-powered + trend-aware)
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/generate_and_post_tweet.py

      - name: Commit tweet memory log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tweet_log.json data/cost_log.json data/report.md
          if git diff --staged --quiet; then
            echo "No tweet log changes to commit"
          else
            git pull --rebase origin main || true
            git commit -m "chore(tweets): update tweet memory $(TZ='America/Los_Angeles' date +'%Y-%m-%d %H:%M PST')"
            git push || true
          fi
