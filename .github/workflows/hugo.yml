name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # full history needed for enableGitInfo accurate lastmod dates

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: resources
          key: hugo-resources-${{ hashFiles('hugo.yaml', 'assets/**', 'layouts/**') }}
          restore-keys: hugo-resources-

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --minify --cleanDestinationDir --gc

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Ping Google with updated sitemap
        if: success()
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://datadripco.com/sitemap.xml" || true
          echo "✅ Pinged Google sitemap"

      - name: Ping Bing IndexNow with all sitemap URLs
        if: success()
        run: |
          # Wait briefly for CDN to pick up new sitemap
          sleep 10
          # Fetch all URLs from the live sitemap
          URLS=$(curl -s "https://datadripco.com/sitemap.xml" | grep -oE 'https://datadripco\.com/[^<]+' | sort -u)
          # Build JSON array of URLs
          URL_JSON=$(echo "$URLS" | jq -R -s 'split("\n") | map(select(length > 0))')
          # POST all URLs to IndexNow
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\": \"datadripco.com\", \"key\": \"9dbe156a43d449c38434fe21472a08be\", \"keyLocation\": \"https://datadripco.com/9dbe156a43d449c38434fe21472a08be.txt\", \"urlList\": $URL_JSON}" || true
          echo "✅ Submitted $(echo "$URLS" | wc -l | tr -d ' ') URLs to Bing IndexNow"
