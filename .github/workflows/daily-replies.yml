name: Datadrip Smart Replies

on:
  schedule:
    - cron: '30 17 * * *'  # 09:30 AM PST / 17:30 UTC
    - cron: '30 23 * * *'  # 03:30 PM PST / 23:30 UTC
  workflow_dispatch:        # Allows manual test anytime

permissions:
  contents: write            # Needed to commit reply log

concurrency:
  group: "replies"
  cancel-in-progress: false  # Each reply is unique

jobs:
  post-reply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Find and reply to a tweet
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/reply_to_tweet.py

      - name: Commit reply log and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cost_log.json data/report.md || true
          if [ -f data/reply_log.json ]; then git add data/reply_log.json; fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase origin main || true
            git commit -m "chore(replies): update reply log $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
