name: Retry Pending Tweet

# Fires every 5 minutes. Checks if a tweet failed to post and was saved to
# data/pending_tweet.json. If found, retries on a fresh runner (new IP address).
# If not found, exits instantly — no cost, no work done.

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # manual trigger for testing

permissions:
  contents: write

concurrency:
  group: "pending-retry"
  cancel-in-progress: false

jobs:
  retry-if-pending:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for pending tweet
        id: check
        run: |
          if [ -f "data/pending_tweet.json" ]; then
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "📬 Pending tweet found — will retry posting on this fresh runner"
          else
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "✅ No pending tweet — nothing to do, exiting"
          fi

      - name: Set up Python
        if: steps.check.outputs.has_pending == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.check.outputs.has_pending == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Retry pending tweet (fresh IP, no Grok cost)
        if: steps.check.outputs.has_pending == 'true'
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/generate_and_post_tweet.py

      - name: Commit results
        if: steps.check.outputs.has_pending == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tweet_log.json data/cost_log.json data/report.md
          # Stage pending_tweet.json whether it was updated (still failing) or deleted (success)
          git rm --cached data/pending_tweet.json 2>/dev/null || git add data/pending_tweet.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase origin main || true
            git commit -m "chore(tweets): pending tweet retry $(TZ='America/Los_Angeles' date +'%Y-%m-%d %H:%M PST')"
            git push || true
          fi
