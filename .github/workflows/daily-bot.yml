name: Daily Datadripco Post Generator

on:
  schedule:
    - cron: '0 13 * * *'      # 5:00 AM PST — optimal news time
  workflow_dispatch:           # Allows you to test manually anytime

permissions:
  contents: write              # Needed to commit the new post
  pages: write                 # Needed to deploy to GitHub Pages
  id-token: write              # Needed for Pages deployment

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive   # In case you ever add any

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate new posts with your smart bot
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: python scripts/generate_post.py --daily

      - name: Commit new posts (only if any were created)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/ static/images/ data/cost_log.json data/report.md
          if git diff --staged --quiet; then
            echo "new_posts=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(bot): daily automated post $(TZ='America/Los_Angeles' date +'%Y-%m-%d %H:%M PST')"
            git push
            echo "new_posts=true" >> $GITHUB_OUTPUT
          fi

      # === Build & Deploy Hugo (only if new posts were created) ===
      - name: Setup Hugo
        if: steps.commit.outputs.new_posts == 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Build with Hugo
        if: steps.commit.outputs.new_posts == 'true'
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --minify

      - name: Setup Pages
        if: steps.commit.outputs.new_posts == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.commit.outputs.new_posts == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.new_posts == 'true'
        uses: actions/deploy-pages@v4
