name: Daily Datadrip Post Generator

on:
  schedule:
    - cron: '0 13 * * *'      # Every day at 13:00 UTC — optimal news time
  workflow_dispatch:           # Allows you to test manually anytime

permissions:
  contents: write              # Needed to commit the new post

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive   # In case you ever add any

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate new posts with your smart bot
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: python scripts/generate_post.py --daily

      - name: Commit new posts (only if any were created)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          # Only commit if there are actual changes (prevents empty commits)
          git diff --staged --quiet || git commit -m "chore(bot): daily automated post $(date +'%Y-%m-%d %H:%M UTC')"
          git push
