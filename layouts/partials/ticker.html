{{- /* Live Markets Ticker Bar — iframe deferred to avoid blocking LCP */ -}}
<div class="ticker-bar">
    <div class="ticker-glow"></div>
    <div class="ticker-live-badge">
        <span class="ticker-live-dot"></span>
        <span class="ticker-live-text">LIVE</span>
    </div>
    <div class="ticker-divider"></div>
    <div class="ticker-widget-wrap">
        <div id="ticker-placeholder" class="ticker-iframe" style="min-height:36px"></div>
    </div>
    <div class="ticker-branding">
        <span>MARKETS</span>
    </div>
</div>
<script>
(function(){
    // Only load TradingView iframe on desktop — too heavy for mobile
    if(window.innerWidth<768)return;
    var loaded=false;
    function loadTicker(){
        if(loaded)return;loaded=true;
        var p=document.getElementById('ticker-placeholder');
        if(!p)return;
        var f=document.createElement('iframe');
        f.className='ticker-iframe';
        f.title='Live market ticker';
        f.setAttribute('loading','lazy');
        f.style.border='0';
        f.style.overflow='hidden';
        f.setAttribute('sandbox','allow-scripts allow-popups allow-popups-to-escape-sandbox');
        f.src='https://s.tradingview.com/embed-widget/ticker-tape/?locale=en#%7B%22symbols%22%3A%5B%7B%22proName%22%3A%22BITSTAMP%3ABTCUSD%22%2C%22title%22%3A%22BTC%22%7D%2C%7B%22proName%22%3A%22BITSTAMP%3AETHUSD%22%2C%22title%22%3A%22ETH%22%7D%2C%7B%22proName%22%3A%22BINANCE%3ASOLUSDT%22%2C%22title%22%3A%22SOL%22%7D%2C%7B%22proName%22%3A%22FOREXCOM%3ASPXUSD%22%2C%22title%22%3A%22S%26P%20500%22%7D%2C%7B%22proName%22%3A%22FOREXCOM%3ANSXUSD%22%2C%22title%22%3A%22Nasdaq%22%7D%2C%7B%22proName%22%3A%22TVC%3AGOLD%22%2C%22title%22%3A%22Gold%22%7D%2C%7B%22proName%22%3A%22CRYPTOCAP%3ATOTAL%22%2C%22title%22%3A%22Crypto%20Cap%22%7D%5D%2C%22showSymbolLogo%22%3Atrue%2C%22isTransparent%22%3Atrue%2C%22displayMode%22%3A%22adaptive%22%2C%22colorTheme%22%3A%22dark%22%7D';
        p.parentNode.replaceChild(f,p);
    }
    if('requestIdleCallback' in window){requestIdleCallback(loadTicker,{timeout:3000})}
    else{setTimeout(loadTicker,2000)}
})();
</script>
