{{- /* Critical CSS for above-fold content — inlined to accelerate FCP/SI */ -}}
<style>
:root{--color-bg:#fff;--color-dark:#0a0a0a;--color-text:#0a0a0a;--color-text-muted:#666;--color-border:#e5e5e5;--color-accent:#06f;--font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*,::after,::before{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text);background:var(--color-bg);line-height:1.6;-webkit-font-smoothing:antialiased}
.skip-link{position:absolute;top:-100%;left:50%;transform:translateX(-50%);z-index:9999;background:var(--color-accent);color:#fff;padding:8px 16px;border-radius:4px;font-size:14px;font-weight:600}
.skip-link:focus{top:8px}
.ticker-bar{position:relative;height:40px;background:#0a0a0a;overflow:hidden}
.header{position:sticky;top:0;z-index:100;background:var(--color-bg);border-bottom:1px solid var(--color-border)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;max-width:1400px;margin:0 auto;height:56px}
.logo a{font-size:20px;font-weight:800;letter-spacing:-0.02em;color:var(--color-dark);text-decoration:none}
.home-page{max-width:1400px;margin:0 auto;padding:0 24px}
.hero-section{padding:24px 0}
.hero-grid{display:grid;gap:0}
.hero-main{position:relative;border-radius:12px;overflow:hidden}
.hero-image{position:relative;aspect-ratio:16/9;overflow:hidden;border-radius:12px}
.hero-image img{width:100%;height:100%;object-fit:cover;display:block}
.hero-content{padding:20px 0 0}
.hero-title{font-size:clamp(20px,3vw,32px);font-weight:800;line-height:1.2;letter-spacing:-0.02em}
@media(min-width:1024px){.hero-grid{grid-template-columns:1fr 320px}.hero-title{font-size:clamp(24px,2.5vw,36px)}}
@media(max-width:767px){.ticker-bar{height:32px}.hero-section{padding:0}.promo-banner{padding:8px 12px;margin-bottom:0;border-radius:0;box-shadow:none}.promo-banner-content{flex-direction:row;flex-wrap:nowrap;gap:8px}}
</style>
