<!-- Google Analytics 4 — deferred, desktop only (saves ~60KB on mobile) -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  if(window.innerWidth>=768){
    (function(){
      function loadGA(){
        if(window._gaLoaded)return;window._gaLoaded=true;
        var s=document.createElement('script');
        s.src='https://www.googletagmanager.com/gtag/js?id=G-MV5WLFFD8Z';
        s.async=true;
        document.head.appendChild(s);
        gtag('js', new Date());
        gtag('config', 'G-MV5WLFFD8Z', {send_page_view: true});
      }
      ['click','scroll','keydown','touchstart'].forEach(function(e){
        document.addEventListener(e,loadGA,{once:true,passive:true});
      });
      if('requestIdleCallback' in window){requestIdleCallback(loadGA,{timeout:4000})}
      else{setTimeout(loadGA,4000)}
    })();
  }
</script>
