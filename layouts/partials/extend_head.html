<!-- Noindex tag pages — prevents Google from indexing thin tag listing pages -->
{{- if eq .Section "tags" }}
<meta name="robots" content="noindex, follow">
{{- end }}

<!-- Google Analytics 4 — deferred, loads on user interaction or after 4s idle -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  (function(){
    function loadGA(){
      if(window._gaLoaded)return;window._gaLoaded=true;
      var s=document.createElement('script');
      s.src='https://www.googletagmanager.com/gtag/js?id=G-MV5WLFFD8Z';
      s.async=true;
      document.head.appendChild(s);
      gtag('js', new Date());
      gtag('config', 'G-MV5WLFFD8Z', {send_page_view: true});
    }
    ['click','scroll','keydown','touchstart'].forEach(function(e){
      document.addEventListener(e,loadGA,{once:true,passive:true});
    });
    if('requestIdleCallback' in window){requestIdleCallback(loadGA,{timeout:4000})}
    else{setTimeout(loadGA,4000)}
  })();
</script>
