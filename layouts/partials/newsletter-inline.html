<!-- Compact in-article newsletter CTA — appears after blog post content -->
<div class="newsletter-inline">
  <form class="newsletter-inline-form"
        onsubmit="return mcRedirectInline(this);">
    <span class="newsletter-inline-text">📬 Enjoyed this? Get weekly AI, crypto &amp; tech insights →</span>
    <div class="newsletter-inline-fields">
      <input type="email"
             id="nl-email-inline"
             class="newsletter-inline-email"
             required
             placeholder="you@example.com"
             aria-label="Email address">
      <button type="submit" class="newsletter-inline-btn">Subscribe</button>
    </div>
  </form>
  <p class="newsletter-inline-legal">By subscribing you agree to our <a href="/privacy/">Privacy Policy</a>. Unsubscribe anytime.</p>
</div>
<script>
function mcRedirectInline(form){
  var email=document.getElementById('nl-email-inline').value;
  var url='https://gmail.us20.list-manage.com/subscribe?u=bef06fe2737e08e1c01ae0f28&id=b7103eb655&MERGE0='+encodeURIComponent(email);
  window.location.href=url;
  return false;
}
</script>
